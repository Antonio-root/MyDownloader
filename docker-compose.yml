version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - API_TOKEN=dev-secret-token
    volumes:
      - backend-downloads:/app/downloads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-downloads:
