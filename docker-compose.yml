version: '3.8'

services:
  downloader-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=3004
      - API_TOKEN=dev-secret-token
    volumes:
      - backend-downloads:/app/downloads
    networks:
      - topo_network
    restart: unless-stopped

  downloader-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    depends_on:
      - downloader-backend
    networks:
      - topo_network
    restart: unless-stopped

volumes:
  backend-downloads:

networks:
  topo_network:
    external: true
